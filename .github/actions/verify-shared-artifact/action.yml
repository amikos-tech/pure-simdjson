name: verify-shared-artifact
description: Run supplemental artifact audits and reserve the two required release smoke gates.

inputs:
  artifact-path:
    description: Path to the staged library artifact.
    required: true
  goos:
    description: GOOS for the staged artifact.
    required: true
  goarch:
    description: GOARCH for the staged artifact.
    required: true
  rust-target:
    description: Rust target triple for the staged artifact.
    required: true
  native-abi-smoke-command:
    description: Command that resolves every public symbol in include/pure_simdjson.h and invokes each once.
    required: false
    default: ""
  minimal-parse-smoke-command:
    description: Command that runs tests/smoke/minimal_parse.c against the staged artifact.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Verify input artifact exists
      shell: bash
      run: |
        set -euo pipefail
        test -f "${{ inputs.artifact-path }}"

    - name: Supplemental Linux artifact audits
      if: ${{ inputs.goos == 'linux' }}
      shell: bash
      run: |
        set -euo pipefail
        nm -D --defined-only "${{ inputs.artifact-path }}"
        objdump -T "${{ inputs.artifact-path }}"

    - name: Supplemental macOS artifact audits
      if: ${{ inputs.goos == 'darwin' }}
      shell: bash
      run: |
        set -euo pipefail
        file "${{ inputs.artifact-path }}"
        codesign --verify --verbose "${{ inputs.artifact-path }}"

    - name: Supplemental Windows artifact audits
      if: ${{ inputs.goos == 'windows' }}
      shell: pwsh
      run: |
        $ErrorActionPreference = 'Stop'
        dumpbin /EXPORTS "${{ inputs.artifact-path }}"

    - name: Require native ABI-load smoke gate
      shell: bash
      run: |
        set -euo pipefail
        if [[ -z "${{ inputs.native-abi-smoke-command }}" ]]; then
          echo "CI-04 requires a native ABI-load smoke gate. Export audits are supplemental evidence only." >&2
          echo "Wire a command that resolves every public symbol declared in include/pure_simdjson.h and invokes each once." >&2
          exit 1
        fi

    - name: Run native ABI-load smoke gate
      shell: bash
      run: |
        set -euo pipefail
        eval "${{ inputs.native-abi-smoke-command }}"

    - name: Require minimal_parse.c smoke gate
      shell: bash
      run: |
        set -euo pipefail
        if [[ -z "${{ inputs.minimal-parse-smoke-command }}" ]]; then
          echo "CI-04 requires tests/smoke/minimal_parse.c against the staged artifact. Export audits are not a substitute." >&2
          exit 1
        fi

    - name: Run minimal_parse.c smoke gate
      shell: bash
      run: |
        set -euo pipefail
        eval "${{ inputs.minimal-parse-smoke-command }}"
