name: release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  linux-build:
    name: linux build (${{ matrix.platform_id }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform_id: linux-amd64
            goos: linux
            goarch: amd64
            rust_target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            manylinux_image: quay.io/pypa/manylinux2014_x86_64@sha256:96412a3110ba598851ba1cd9bfa66b74c2903bfec1af978f5e55def5f0f1912c
          - platform_id: linux-arm64
            goos: linux
            goarch: arm64
            rust_target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            manylinux_image: quay.io/pypa/manylinux2014_aarch64@sha256:2cfb8a1feca0f640b26689e27aadff0a8ff367243d2672a31207d075318d26c7
    defaults:
      run:
        shell: bash
    env:
      PURE_SIMDJSON_PAGESIZE_PROOF_OUTPUT: ${{ github.workspace }}/linux-arm64-pagesize.txt
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Resolve release metadata
        id: metadata
        run: |
          set -euo pipefail

          version="$(sed -n 's/^const Version = "\(.*\)"/\1/p' internal/bootstrap/version.go)"
          if [[ -z "$version" ]]; then
            echo "failed to resolve bootstrap version from internal/bootstrap/version.go" >&2
            exit 1
          fi

          SOURCE_DATE_EPOCH="$(git log -1 --pretty=%ct)"
          echo "SOURCE_DATE_EPOCH=$SOURCE_DATE_EPOCH" >>"$GITHUB_ENV"
          echo "version=$version" >>"$GITHUB_OUTPUT"
          echo "source-date-epoch=$SOURCE_DATE_EPOCH" >>"$GITHUB_OUTPUT"

      - name: Record linux/arm64 4K page-size proof
        if: ${{ matrix.platform_id == 'linux-arm64' }}
        run: |
          set -euo pipefail
          bash scripts/release/build_linux_manylinux.sh prove-pagesize \
            --linux-platform linux/arm64 \
            --output linux-arm64-pagesize.txt

      - name: Build shared library
        id: build
        uses: ./.github/actions/build-shared-library
        with:
          target: ${{ matrix.rust_target }}
          goos: ${{ matrix.goos }}
          goarch: ${{ matrix.goarch }}
          runner_kind: linux
          manylinux_image: ${{ matrix.manylinux_image }}
          source_date_epoch: ${{ steps.metadata.outputs.source-date-epoch }}
          verify_reproducible: false
          # Escape hatch stays explicit: keep use_zigbuild false unless a later
          # manual path proves manylinux is blocked.
          use_zigbuild: "false"

      - name: Verify glibc floor and linux export surface
        run: |
          set -euo pipefail
          bash scripts/release/verify_glibc_floor.sh "${{ steps.build.outputs.built-library-path }}"

      - name: Package linux shared library
        id: package
        uses: ./.github/actions/package-shared-artifact
        with:
          input: ${{ steps.build.outputs.built-library-path }}
          goos: ${{ matrix.goos }}
          goarch: ${{ matrix.goarch }}
          rust-target: ${{ matrix.rust_target }}
          version: ${{ steps.metadata.outputs.version }}
          out-dir: ${{ github.workspace }}/dist/${{ matrix.platform_id }}

      - name: Upload staged linux artifact bundle
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: release-${{ matrix.platform_id }}
          if-no-files-found: error
          path: ${{ github.workspace }}/dist/${{ matrix.platform_id }}

  darwin-build:
    name: darwin build (${{ matrix.platform_id }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform_id: darwin-amd64
            goos: darwin
            goarch: amd64
            rust_target: x86_64-apple-darwin
            runner: macos-15-intel
            expected_file_arch: x86_64
            expected_r2_filename: libpure_simdjson.dylib
            expected_github_asset_name: libpure_simdjson-darwin-amd64.dylib
          - platform_id: darwin-arm64
            goos: darwin
            goarch: arm64
            rust_target: aarch64-apple-darwin
            runner: macos-15
            expected_file_arch: arm64
            expected_r2_filename: libpure_simdjson.dylib
            expected_github_asset_name: libpure_simdjson-darwin-arm64.dylib
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          submodules: recursive

      - name: Resolve release metadata
        id: metadata
        run: |
          set -euo pipefail

          version="$(sed -n 's/^const Version = "\(.*\)"/\1/p' internal/bootstrap/version.go)"
          if [[ -z "$version" ]]; then
            echo "failed to resolve bootstrap version from internal/bootstrap/version.go" >&2
            exit 1
          fi

          SOURCE_DATE_EPOCH="$(git log -1 --pretty=%ct)"
          echo "SOURCE_DATE_EPOCH=$SOURCE_DATE_EPOCH" >>"$GITHUB_ENV"
          echo "version=$version" >>"$GITHUB_OUTPUT"
          echo "source-date-epoch=$SOURCE_DATE_EPOCH" >>"$GITHUB_OUTPUT"

      - name: Build shared library
        id: build
        uses: ./.github/actions/build-shared-library
        with:
          target: ${{ matrix.rust_target }}
          goos: ${{ matrix.goos }}
          goarch: ${{ matrix.goarch }}
          runner_kind: darwin
          source_date_epoch: ${{ steps.metadata.outputs.source-date-epoch }}
          verify_reproducible: false

      - name: Ad-hoc codesign darwin dylib
        run: |
          set -euo pipefail
          codesign -s - --force --timestamp=none "${{ steps.build.outputs.built-library-path }}"
          codesign --verify --verbose "${{ steps.build.outputs.built-library-path }}"

      - name: Verify darwin dylib is thin
        run: |
          set -euo pipefail
          file_output="$(file "${{ steps.build.outputs.built-library-path }}")"
          echo "$file_output"
          if [[ -n "${GITHUB_STEP_SUMMARY:-}" ]]; then
            printf '### %s file output\n\n```\n%s\n```\n' "${{ matrix.platform_id }}" "$file_output" >>"$GITHUB_STEP_SUMMARY"
          fi
          if grep -Eiq 'fat|universal' <<<"$file_output"; then
            echo "expected a thin darwin binary, got: $file_output" >&2
            exit 1
          fi
          if ! grep -q "${{ matrix.expected_file_arch }}" <<<"$file_output"; then
            echo "expected darwin binary for arch ${{ matrix.expected_file_arch }}, got: $file_output" >&2
            exit 1
          fi

      - name: Package darwin shared library
        id: package
        uses: ./.github/actions/package-shared-artifact
        with:
          input: ${{ steps.build.outputs.built-library-path }}
          goos: ${{ matrix.goos }}
          goarch: ${{ matrix.goarch }}
          rust-target: ${{ matrix.rust_target }}
          version: ${{ steps.metadata.outputs.version }}
          out-dir: ${{ github.workspace }}/dist/${{ matrix.platform_id }}

      - name: Assert darwin artifact names
        run: |
          set -euo pipefail
          test "${{ steps.package.outputs.github-asset-name }}" = "${{ matrix.expected_github_asset_name }}"
          test "$(basename "${{ steps.package.outputs.r2-path }}")" = "${{ matrix.expected_r2_filename }}"

      - name: Verify staged darwin artifact
        uses: ./.github/actions/verify-shared-artifact
        with:
          artifact-path: ${{ steps.package.outputs.r2-path }}
          goos: ${{ matrix.goos }}
          goarch: ${{ matrix.goarch }}
          rust-target: ${{ matrix.rust_target }}
          native-abi-smoke-command: |
            set -euo pipefail
            tmp_dir="$(mktemp -d "${RUNNER_TEMP:-/tmp}/pure-simdjson-darwin-exports.XXXXXX")"
            expected_symbols="$tmp_dir/expected.txt"
            exported_symbols="$tmp_dir/exported.txt"
            python3 - <<'PY' >"$expected_symbols"
            from pathlib import Path
            import re
            text = Path("include/pure_simdjson.h").read_text(encoding="utf-8")
            names = re.findall(r"pure_simdjson_error_code_t\s+(pure_simdjson_[a-zA-Z0-9_]+)\s*\(", text)
            print("\n".join(sorted(names)))
            PY
            nm -gU "${{ steps.package.outputs.r2-path }}" \
              | awk '{print $3}' \
              | sed 's/^_//' \
              | grep '^pure_simdjson_' \
              | sort -u >"$exported_symbols"
            diff -u "$expected_symbols" "$exported_symbols"
          minimal-parse-smoke-command: |
            set -euo pipefail
            artifact_dir="$(dirname "${{ steps.package.outputs.r2-path }}")"
            smoke_dir="$(mktemp -d "${RUNNER_TEMP:-/tmp}/pure-simdjson-darwin-smoke.XXXXXX")"
            cc -Iinclude tests/smoke/minimal_parse.c \
              -L"$artifact_dir" \
              -lpure_simdjson \
              -Wl,-rpath,"$artifact_dir" \
              -o "$smoke_dir/minimal_parse"
            "$smoke_dir/minimal_parse"

      - name: Upload staged darwin artifact bundle
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: release-${{ matrix.platform_id }}
          if-no-files-found: error
          path: ${{ github.workspace }}/dist/${{ matrix.platform_id }}

  windows-build:
    name: windows build (${{ matrix.platform_id }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform_id: windows-amd64
            goos: windows
            goarch: amd64
            rust_target: x86_64-pc-windows-msvc
            runner: windows-latest
            expected_r2_filename: pure_simdjson-msvc.dll
            expected_github_asset_name: pure_simdjson-windows-amd64-msvc.dll
            import_library_name: pure_simdjson.dll.lib
            dependency_report_name: windows-dependents.txt
    defaults:
      run:
        shell: bash
    steps:
      - name: Configure MSVC developer shell
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756

      - name: Enable git long paths
        shell: pwsh
        run: git config --system core.longpaths true

      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          submodules: recursive

      - name: Resolve release metadata
        id: metadata
        run: |
          set -euo pipefail

          version="$(sed -n 's/^const Version = "\(.*\)"/\1/p' internal/bootstrap/version.go)"
          if [[ -z "$version" ]]; then
            echo "failed to resolve bootstrap version from internal/bootstrap/version.go" >&2
            exit 1
          fi

          SOURCE_DATE_EPOCH="$(git log -1 --pretty=%ct)"
          echo "SOURCE_DATE_EPOCH=$SOURCE_DATE_EPOCH" >>"$GITHUB_ENV"
          echo "version=$version" >>"$GITHUB_OUTPUT"
          echo "source-date-epoch=$SOURCE_DATE_EPOCH" >>"$GITHUB_OUTPUT"

      - name: Build shared library
        id: build
        uses: ./.github/actions/build-shared-library
        with:
          target: ${{ matrix.rust_target }}
          goos: ${{ matrix.goos }}
          goarch: ${{ matrix.goarch }}
          runner_kind: windows
          source_date_epoch: ${{ steps.metadata.outputs.source-date-epoch }}
          verify_reproducible: false

      - name: Audit windows exports
        shell: pwsh
        run: dumpbin /EXPORTS "${{ steps.build.outputs.built-library-path }}"

      - name: Package windows shared library
        id: package
        uses: ./.github/actions/package-shared-artifact
        with:
          input: ${{ steps.build.outputs.built-library-path }}
          goos: ${{ matrix.goos }}
          goarch: ${{ matrix.goarch }}
          rust-target: ${{ matrix.rust_target }}
          version: ${{ steps.metadata.outputs.version }}
          out-dir: dist/${{ matrix.platform_id }}

      - name: Assert windows artifact names
        run: |
          set -euo pipefail
          test "${{ steps.package.outputs.github-asset-name }}" = "${{ matrix.expected_github_asset_name }}"
          test "$(basename "${{ steps.package.outputs.r2-path }}")" = "${{ matrix.expected_r2_filename }}"

      - name: Preserve windows import library
        run: |
          set -euo pipefail
          import_lib_path="$(
            python3 - <<'PY'
            from pathlib import Path
            print(Path(r"${{ steps.build.outputs.built-library-path }}").with_name("${{ matrix.import_library_name }}"))
            PY
          )"
          if [[ -f "$import_lib_path" ]]; then
            cp "$import_lib_path" "dist/${{ matrix.platform_id }}/${{ matrix.import_library_name }}"
          fi

      - name: Record windows dependent DLLs
        shell: pwsh
        run: |
          $reportPath = "dist/${{ matrix.platform_id }}/${{ matrix.dependency_report_name }}"
          $output = dumpbin /DEPENDENTS "${{ steps.build.outputs.built-library-path }}" | Out-String
          $output.TrimEnd() | Out-File -FilePath $reportPath -Encoding utf8
          if ($env:GITHUB_STEP_SUMMARY) {
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "### windows-amd64 DLL dependents`n`n```text`n$($output.TrimEnd())`n```"
          }

      - name: Verify staged windows artifact
        uses: ./.github/actions/verify-shared-artifact
        with:
          artifact-path: ${{ steps.package.outputs.r2-path }}
          goos: ${{ matrix.goos }}
          goarch: ${{ matrix.goarch }}
          rust-target: ${{ matrix.rust_target }}
          native-abi-smoke-command: |
            set -euo pipefail
            tmp_dir="$(mktemp -d)"
            expected_symbols="$tmp_dir/expected.txt"
            exported_symbols="$tmp_dir/exported.txt"
            python3 - <<'PY' >"$expected_symbols"
            from pathlib import Path
            import re
            text = Path("include/pure_simdjson.h").read_text(encoding="utf-8")
            names = re.findall(r"pure_simdjson_error_code_t\s+(pure_simdjson_[a-zA-Z0-9_]+)\s*\(", text)
            print("\n".join(sorted(names)))
            PY
            dumpbin /EXPORTS "${{ steps.package.outputs.r2-path }}" >"$tmp_dir/dumpbin.txt"
            grep -oE 'pure_simdjson_[A-Za-z0-9_]+' "$tmp_dir/dumpbin.txt" | sort -u >"$exported_symbols"
            diff -u "$expected_symbols" "$exported_symbols"
          minimal-parse-smoke-command: |
            set -euo pipefail
            ps1="$(mktemp).ps1"
            cat >"$ps1" <<'PWSH'
            $ErrorActionPreference = 'Stop'
            $artifactPath = '${{ steps.package.outputs.r2-path }}'
            $artifactDir = Split-Path -Parent $artifactPath
            $importLibPath = Join-Path $artifactDir '${{ matrix.import_library_name }}'
            if (-not (Test-Path $importLibPath)) {
              throw "missing import library: $importLibPath"
            }
            $smokeDir = Join-Path $env:RUNNER_TEMP 'pure-simdjson-windows-smoke'
            New-Item -ItemType Directory -Force -Path $smokeDir | Out-Null
            cl /nologo /Iinclude tests\smoke\minimal_parse.c /link /LIBPATH:$artifactDir '${{ matrix.import_library_name }}' /OUT:"$smokeDir\minimal_parse.exe"
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            $env:PATH = "$artifactDir;$env:PATH"
            & "$smokeDir\minimal_parse.exe"
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            PWSH
            powershell.exe -NoLogo -NoProfile -File "$(cygpath -w "$ps1")"

      - name: Upload staged windows artifact bundle
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: release-${{ matrix.platform_id }}
          if-no-files-found: error
          path: dist/${{ matrix.platform_id }}

  release-publish-staging:
    name: release publish staging
    runs-on: ubuntu-latest
    needs:
      - linux-build
      - darwin-build
      - windows-build
    defaults:
      run:
        shell: bash
    steps:
      - name: Download staged release artifact bundles
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          pattern: release-*
          path: ${{ github.workspace }}/release-staging
          merge-multiple: true

      - name: Show merged release staging tree
        run: |
          set -euo pipefail
          find "${{ github.workspace }}/release-staging" -type f | sort

      - name: Upload merged release staging tree
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: release-staging
          if-no-files-found: error
          path: ${{ github.workspace }}/release-staging
