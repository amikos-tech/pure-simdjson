language = "C"
pragma_once = true
cpp_compat = true
usize_is_size_t = true
documentation = true
style = "both"
after_includes = "#define PURE_SIMDJSON_ABI_VERSION 0x00010000"

[export]
include = [
  "pure_simdjson_error_code_t",
  "pure_simdjson_value_kind_t",
  "pure_simdjson_handle_t",
  "pure_simdjson_parser_t",
  "pure_simdjson_doc_t",
  "pure_simdjson_handle_parts_t",
  "pure_simdjson_value_view_t",
  "pure_simdjson_array_iter_t",
  "pure_simdjson_object_iter_t",
]
exclude = [
  "psimdjson_parser",
  "psimdjson_doc",
  "psimdjson_element",
  "psimdjson_get_implementation_name_len",
  "psimdjson_copy_implementation_name",
  "psimdjson_padding_bytes",
  "psimdjson_parser_new",
  "psimdjson_parser_free",
  "psimdjson_parser_parse",
  "psimdjson_parser_get_last_error_len",
  "psimdjson_parser_copy_last_error",
  "psimdjson_parser_get_last_error_offset",
  "psimdjson_doc_free",
  "psimdjson_doc_root",
  "psimdjson_element_type",
  "psimdjson_element_get_int64",
  "psimdjson_test_force_cpp_exception",
]
item_types = ["functions", "globals", "typedefs", "opaque", "structs", "enums"]
